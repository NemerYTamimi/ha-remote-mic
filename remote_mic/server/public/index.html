<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Remote Mic</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #111827;
      color: #f3f4f6;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 16px;
      padding: 40px;
      width: 340px;
      text-align: center;
      box-shadow: 0 25px 50px rgba(0,0,0,0.4);
    }

    h1 { font-size: 1.25rem; font-weight: 600; margin-bottom: 6px; }
    .subtitle { font-size: 0.85rem; color: #9ca3af; margin-bottom: 32px; }

    .mic-ring {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      margin: 0 auto 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #374151;
      border: 3px solid #4b5563;
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    .mic-ring.active {
      border-color: #34d399;
      box-shadow: 0 0 0 8px rgba(52,211,153,0.15), 0 0 0 16px rgba(52,211,153,0.05);
    }
    .mic-ring svg { width: 40px; height: 40px; fill: #9ca3af; transition: fill 0.3s; }
    .mic-ring.active svg { fill: #34d399; }

    .meter {
      width: 100%;
      height: 6px;
      background: #374151;
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 28px;
    }
    .meter-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #34d399, #10b981);
      border-radius: 3px;
      transition: width 0.05s linear;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    button:active { transform: scale(0.98); }
    #btn-listen { background: #3b82f6; color: #fff; }
    #btn-listen:hover { background: #2563eb; }
    #btn-listen.stop { background: #ef4444; }
    #btn-listen.stop:hover { background: #dc2626; }

    .status {
      margin-top: 16px;
      font-size: 0.8rem;
      color: #6b7280;
      min-height: 20px;
    }
    .status.error { color: #f87171; }
    .status.ok { color: #34d399; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Remote Mic</h1>
    <p class="subtitle">Home Assistant host microphone</p>

    <div class="mic-ring" id="mic-ring">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 1a4 4 0 0 1 4 4v6a4 4 0 0 1-8 0V5a4 4 0 0 1 4-4zm-1.5 18.94V22h3v-2.06A7.003 7.003 0 0 0 19 13h-2a5 5 0 0 1-10 0H5a7.003 7.003 0 0 0 5.5 6.94z"/>
      </svg>
    </div>

    <div class="meter"><div class="meter-bar" id="meter-bar"></div></div>

    <button id="btn-listen">Listen</button>
    <p class="status" id="status">Disconnected</p>
  </div>

  <script>
    const btn = document.getElementById('btn-listen');
    const statusEl = document.getElementById('status');
    const ring = document.getElementById('mic-ring');
    const meterBar = document.getElementById('meter-bar');

    let audio = null;
    let audioCtx = null;
    let source = null;
    let analyser = null;
    let animFrame = null;

    function setStatus(msg, cls = '') {
      statusEl.textContent = msg;
      statusEl.className = 'status ' + cls;
    }

    // Build URL relative to current page so it works via HA ingress too
    function streamUrl() {
      const base = location.href.replace(/\/[^/]*$/, '');
      return base + '/stream.wav';
    }

    function startListening() {
      audio = new Audio();
      audio.src = streamUrl();
      audio.crossOrigin = 'anonymous';

      audioCtx = new AudioContext();
      source = audioCtx.createMediaElementSource(audio);
      analyser = audioCtx.createAnalyser();
      analyser.fftSize = 256;
      source.connect(analyser);
      analyser.connect(audioCtx.destination);

      audio.addEventListener('playing', () => {
        setStatus('Connected — listening', 'ok');
        ring.classList.add('active');
        btn.textContent = 'Stop';
        btn.classList.add('stop');
        animateMeter();
      });

      audio.addEventListener('error', () => {
        setStatus('Stream error — check add-on logs', 'error');
        stopListening();
      });

      audio.addEventListener('ended', () => stopListening());

      audio.play().catch((err) => {
        setStatus(err.message, 'error');
        stopListening();
      });

      setStatus('Connecting…');
    }

    function stopListening() {
      if (audio) {
        audio.pause();
        audio.src = '';
        audio = null;
      }
      if (source) { source.disconnect(); source = null; }
      if (analyser) { analyser.disconnect(); analyser = null; }
      if (audioCtx) { audioCtx.close(); audioCtx = null; }
      ring.classList.remove('active');
      btn.textContent = 'Listen';
      btn.classList.remove('stop');
      setStatus('Disconnected');
      stopMeter();
    }

    function animateMeter() {
      const data = new Uint8Array(analyser.frequencyBinCount);
      function tick() {
        analyser.getByteTimeDomainData(data);
        let sum = 0;
        for (let i = 0; i < data.length; i++) {
          const v = (data[i] - 128) / 128;
          sum += v * v;
        }
        const rms = Math.sqrt(sum / data.length);
        meterBar.style.width = Math.min(100, rms * 400) + '%';
        animFrame = requestAnimationFrame(tick);
      }
      tick();
    }

    function stopMeter() {
      if (animFrame) cancelAnimationFrame(animFrame);
      animFrame = null;
      meterBar.style.width = '0%';
    }

    btn.addEventListener('click', () => {
      if (audio) stopListening();
      else startListening();
    });
  </script>
</body>
</html>
