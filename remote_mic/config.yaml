name: Remote Mic
version: "1.1.0"
slug: remote_mic
description: Stream the HA host microphone to remote browsers in real-time
url: https://github.com/nemertamimi/ha-remote-mic
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
startup: application
boot: auto
audio: true
ports:
  8765/tcp: 8765
ports_description:
  8765/tcp: WebSocket + Web UI
ingress: true
ingress_port: 8765
panel_icon: mdi:microphone
panel_title: Remote Mic
options:
  sample_rate: 44100
  channels: 1
  bit_depth: 16
  device: ""
schema:
  sample_rate: int
  channels: int
  bit_depth: int
  device: str
